<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipeline Security Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <p class="hero__eyebrow">Pipeline Security Monitor</p>
        <h1>Real-time visibility for your data pipelines</h1>
        <p class="hero__sub">
          Ingest events, detect threats, and watch alerts stream in live.
        </p>
        <div class="hero__actions">
          <button id="simulate-login">Simulate Failed Logins</button>
          <button id="simulate-scan">Simulate Port Scan</button>
          <button id="simulate-secret">Simulate Secret Leak</button>
        </div>
      </div>
      <div class="hero__panel">
        <div class="stat">
          <span id="event-count">0</span>
          <small>Events</small>
        </div>
        <div class="stat">
          <span id="alert-count">0</span>
          <small>Alerts</small>
        </div>
        <div class="stat">
          <span id="last-alert">None</span>
          <small>Latest Alert</small>
        </div>
      </div>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>Live Alerts</h2>
        <ul id="alerts"></ul>
      </section>
      <section class="panel">
        <h2>Recent Events</h2>
        <ul id="events"></ul>
      </section>
      <section class="panel chart">
        <h2>Alert Trends</h2>
        <canvas id="alertChart" height="140"></canvas>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
