<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PipeSentinel SOC</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">PipeSentinel</p>
        <h1>Pipeline Security Operations Center</h1>
      </div>
      <div class="actions">
        <button id="seed">Generate Attack Telemetry</button>
        <button id="reset">Reset + Rebuild Dataset</button>
      </div>
    </header>

    <main class="layout">
      <section class="kpi-grid">
        <article class="card"><h2>Total Events</h2><p id="total-events">0</p></article>
        <article class="card"><h2>Threats Detected</h2><p id="threats-detected">0</p></article>
        <article class="card"><h2>High-Risk Alerts</h2><p id="high-risk">0</p></article>
        <article class="card"><h2>Org Risk Score</h2><p id="org-risk">0</p><small id="org-risk-level">Low</small></article>
      </section>

      <section class="panel chart-panel">
        <h3>Event Volume Trend (per minute)</h3>
        <canvas id="trendChart"></canvas>
      </section>

      <section class="panel chart-panel">
        <h3>Threat Breakdown</h3>
        <canvas id="threatChart"></canvas>
      </section>

      <section class="panel">
        <h3>Priority Alerts</h3>
        <table>
          <thead><tr><th>Threat</th><th>IP</th><th>Risk</th><th>Priority</th><th>Timestamp</th></tr></thead>
          <tbody id="alert-table"></tbody>
        </table>
      </section>

      <section class="panel">
        <h3>Top Risk Assets (IP)</h3>
        <table>
          <thead><tr><th>IP Address</th><th>Risk Score</th><th>Risk Level</th></tr></thead>
          <tbody id="ip-table"></tbody>
        </table>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
